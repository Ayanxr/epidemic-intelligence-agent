version: '3.8'

services:
  rag-agent:
    build: .
    container_name: epidemic_intelligence_container
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      # Keeps FastEmbed weights cached locally so it never has to download them twice
      - ./fastembed_cache:/root/.cache
    restart: always