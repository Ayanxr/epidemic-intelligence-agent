version: '3.8'

services:
  epidemic-agent-app:
    build: .
    container_name: epidemic_intelligence_container
    ports:
      - "8501:8501"
    # Mount local directories so databases and user uploads sync safely with the container runtime
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
    # Automatically load your private GROQ key from your local environment file
    env_file:
      - .env
    restart: unless-stopped